<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Практика 1 — SCSS карточка товара</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <article class="product-card product-card--accent">
      <img
        class="product-card__image"
        src="./img/product.jpg"
        alt="Товар"
        width="560"
        height="360"
      />

      <div class="product-card__content">
        <h1 class="product-card__title">Компьютерная мышь</h1>
        <p class="product-card__desc">
          Эргономичная форма, точный
        </p>

        <div class="product-card__footer">
          <div class="product-card__price">1 490 ₽</div>
          <button class="product-card__btn" type="button">В корзину</button>
        </div>
      </div>
    </article>
  </main>
</body>
</html>
